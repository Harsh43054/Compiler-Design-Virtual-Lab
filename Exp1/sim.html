<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lexical Analysis Simulator</title>
<link rel="stylesheet" href="simulation.css">

<style>
.token{
padding:10px;
margin:5px;
border:2px solid #4a90e2;
border-radius:6px;
display:inline-block;
font-weight:bold;
}

.token.active{
background:#4a90e2;
color:white;
}

#sourceCode{
width:100%;
height:120px;
font-family:monospace;
font-size:16px;
}

#tokenBox{
min-height:120px;
padding:10px;
border:2px dashed #999;
margin-top:10px;
}

pre.active{
background:#fff3cd;
border-left:5px solid orange;
}
</style>

</head>

<body>

<div class="header">
Lexical Analysis Simulator
</div>

<div class="main-container">

<div class="panel problem-panel">
<div class="panel-header">Source Program</div>

<div class="panel-body">

<textarea id="sourceCode">
int sum = a + 10;
</textarea>

<div class="button-row">
<button class="start" onclick="start()">Start</button>
<button class="next" onclick="nextStep()">Next</button>
<button class="reset" onclick="resetSim()">Reset</button>
</div>

</div>
</div>

<div class="panel step-panel">
<div class="panel-header">Lexical Analysis Steps</div>
<div class="panel-body" id="steps"></div>
</div>

<div class="panel result-panel">
<div class="panel-header">Generated Tokens</div>
<div class="panel-body">

<div id="tokenBox"></div>

</div>
</div>

</div>

<script src="ssc.js"></script>

</body>
</html>

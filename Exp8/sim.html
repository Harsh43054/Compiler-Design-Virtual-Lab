<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type Checking Simulator</title>
<link rel="stylesheet" href="simulation.css">

<style>
.expr{
padding:12px;
font-size:18px;
font-weight:bold;
background:#f8f9fa;
border-radius:8px;
margin-top:10px;
text-align:center;
}

.result{
margin-top:15px;
padding:12px;
border-radius:8px;
font-weight:bold;
text-align:center;
font-size:17px;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

pre.active{
background:#fff3cd;
border-left:5px solid orange;
padding:10px;
}
</style>

</head>

<body>

<div class="header">
Type Checking Simulator
</div>

<div class="main-container">

<!-- Input Panel -->
<div class="panel problem-panel">
<div class="panel-header">Expression Selection</div>

<div class="panel-body">

<select id="expression">
<option value="">-- Select Expression --</option>

<option value="valid1">
int a;
float b;
a = 10;
</option>

<option value="valid2">
float x;
int y;
x = y;
</option>

<option value="error1">
int a;
a = "Hello";
</option>

<option value="error2">
char c;
c = 10 + "A";
</option>

</select>

<div class="button-row">
<button class="start" onclick="start()">Start</button>
<button class="next" onclick="nextStep()">Next</button>
<button class="reset" onclick="resetSim()">Reset</button>
</div>

</div>
</div>

<!-- Steps Panel -->
<div class="panel step-panel">
<div class="panel-header">Semantic Analysis Steps</div>

<div class="panel-body" id="steps">
Select an expression and click Start.
</div>
</div>

<!-- Result Panel -->
<div class="panel result-panel">
<div class="panel-header">Type Checking Result</div>

<div class="panel-body">

<div class="expr" id="exprBox">
Expression will appear here
</div>

<div id="resultBox" class="result">
Waiting for simulation...
</div>

</div>
</div>

</div>

<script src="ssc.js"></script>

</body>
</html>

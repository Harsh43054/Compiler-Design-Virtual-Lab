<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parse Tree Generator</title>
<link rel="stylesheet" href="simulation.css">

<style>
.node{
display:inline-block;
padding:12px 18px;
margin:10px;
border:2px solid #4a90e2;
border-radius:10px;
font-weight:bold;
background:#f8fbff;
}

.node.active{
background:#4a90e2;
color:white;
transform:scale(1.05);
}

.tree{
text-align:center;
font-size:18px;
line-height:2;
}

pre.active{
background:#fff3cd;
border-left:5px solid orange;
}
</style>

</head>

<body>

<div class="header">
Parse Tree Generator
</div>

<div class="main-container">

<div class="panel problem-panel">
<div class="panel-header">Expression Input</div>

<div class="panel-body">

<select id="expr">
<option value="">--Select Expression--</option>
<option value="a+b">a + b</option>
<option value="a+b*c">a + b * c</option>
<option value="a*b+c">a * b + c</option>
</select>

<div class="button-row">
<button class="start" onclick="start()">Start</button>
<button class="next" onclick="nextStep()">Next</button>
<button class="reset" onclick="resetSim()">Reset</button>
</div>

</div>
</div>

<div class="panel step-panel">
<div class="panel-header">Derivation Steps</div>
<div class="panel-body" id="steps"></div>
</div>

<div class="panel result-panel">
<div class="panel-header">Parse Tree</div>
<div class="panel-body">
<div id="treeBox" class="tree"></div>
</div>
</div>

</div>

<script src="ssc.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three Address Code Generator</title>
<link rel="stylesheet" href="simulation.css">

<style>
.codeBox{
padding:12px;
font-size:18px;
font-weight:bold;
background:#f8f9fa;
border-radius:8px;
margin-top:10px;
text-align:center;
}

.result{
margin-top:15px;
padding:12px;
border-radius:8px;
font-weight:bold;
font-size:17px;
background:#eef6ff;
text-align:left;
line-height:1.8;
}

pre.active{
background:#fff3cd;
border-left:5px solid orange;
padding:10px;
}
</style>

</head>

<body>

<div class="header">
Three Address Code Generator
</div>

<div class="main-container">

<!-- Input Panel -->
<div class="panel problem-panel">
<div class="panel-header">Expression Selection</div>

<div class="panel-body">

<select id="expression">
<option value="">-- Select Expression --</option>

<option value="exp1">a + b * c</option>

<option value="exp2">
(a + b) * c
</option>

<option value="exp3">
a * b + c * d
</option>

</select>

<div class="button-row">
<button class="start" onclick="start()">Start</button>
<button class="next" onclick="nextStep()">Next</button>
<button class="reset" onclick="resetSim()">Reset</button>
</div>

</div>
</div>

<!-- Steps Panel -->
<div class="panel step-panel">
<div class="panel-header">Generation Steps</div>

<div class="panel-body" id="steps">
Select an expression and click Start.
</div>
</div>

<!-- Result Panel -->
<div class="panel result-panel">
<div class="panel-header">Generated TAC</div>

<div class="panel-body">

<div class="codeBox" id="exprBox">
Expression will appear here
</div>

<div id="resultBox" class="result">
Waiting for simulation...
</div>

</div>
</div>

</div>

<script src="ssc.js"></script>

</body>
</html>
